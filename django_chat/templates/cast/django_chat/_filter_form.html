<form method="get" class="filter-form" aria-label="Filter episodes">
  <label class="visually-hidden" for="id_search">Search</label>
  <input id="id_search" type="text" name="search" placeholder="Search episodes" value="{{ form.search.value|default_if_none:'' }}">

  <div class="filter-date">
    {# Keep names/IDs aligned with django-filter's DateFromToRangeFilter widget. #}
    <label class="visually-hidden" for="id_date_0">Start date</label>
    <input type="date" name="date_after" id="id_date_0" value="{{ request.GET.date_after }}">
    <span aria-hidden="true">-</span>
    <label class="visually-hidden" for="id_date_1">End date</label>
    <input type="date" name="date_before" id="id_date_1" value="{{ request.GET.date_before }}">
  </div>

  <select name="date_facets" aria-label="Date facets">
    <option value="">All dates</option>
    {% for value, label in form.date_facets.field.choices %}
      <option value="{{ value }}"{% if form.date_facets.value == value %} selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>

  <select name="o" aria-label="Sort order">
    <option value="">Newest first</option>
    {# OrderingFilter exposes its bound value as a list (e.g. ['visible_date']), so check membership #}
    {% for value, label in form.o.field.choices %}
      {% if value %}<option value="{{ value }}"{% if form.o.value and value in form.o.value %} selected{% endif %}>{{ label }}</option>{% endif %}
    {% endfor %}
  </select>

  <button type="submit">Filter</button>
</form>
