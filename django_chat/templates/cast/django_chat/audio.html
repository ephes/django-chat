{% load static %}
{% if page.pk %}
  {% if not render_for_feed %}
    <podlove-player
      id="audio_{{ value.pk }}"
      data-variant="xl"
      data-url="{% url 'cast:api:audio_podlove_detail' pk=value.pk post_id=page.pk %}"
      data-embed="{% static 'cast/js/web-player/embed.5.js' %}"
      {# Django Chat ships a single local theme, so pin the player config to its token override. #}
      data-config="{% url 'cast:api:player_config' %}?template_base_dir=django_chat"
      data-template="{% url 'django_chat_podlove_player_template' %}"
    >
    </podlove-player>
  {% endif %}
{% endif %}
