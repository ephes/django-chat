{# Reusable subpage header. Required vars: eyebrow, heading. Optional: tagline. #}
<div class="page-header-wrap">
<section class="page-header">
  <svg class="page-header-shape"
       viewBox="0 0 1545.62 926.99"
       preserveAspectRatio="none"
       aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="page-header-bubble-gradient" x1="0" y1="0" x2="0.2" y2="1">
        <stop offset="0" stop-color="#14513a"/>
        <stop offset="0.55" stop-color="#14513a"/>
        <stop offset="1" stop-color="#0ea342"/>
      </linearGradient>
    </defs>
    <path d="M1545.62,413.83C1545.62,185.28,1199.62,0,772.81,0S0,185.28,0,413.83c0,160.34,170.28,299.38,419.29,368.09,9.69,2.67,14.9,13.17,11.19,22.51l-48.6,122.56,212.97-102.11c8.91-4.27,18.83-5.97,28.65-4.94,33.35,3.5,67.48,5.84,102.22,6.96,11.83.78,23.67,1.18,35.5,1.18,7.43,0,14.83-.16,22.21-.46,421.92-3.04,762.19-187.14,762.19-413.79Z" fill="url(#page-header-bubble-gradient)"/>
  </svg>
  <div class="page-header-inner">
    <p class="eyebrow">{{ eyebrow }}</p>
    <h1>{{ heading }}</h1>
    {% if tagline %}<p class="page-header-tagline">{{ tagline }}</p>{% endif %}
  </div>
</section>
</div>
