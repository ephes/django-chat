<nav class="pagination-nav" aria-label="Episode pages" data-vt-pagination-nav>
  {% if has_previous %}
    <a href="?page={{ previous_page_number }}{{ parameters }}" data-vt-transition="pagination" data-vt-pagination-direction="backwards">← Newer</a>
  {% endif %}
  <span>Page {{ page_number }}</span>
  {% if has_next %}
    <a href="?page={{ next_page_number }}{{ parameters }}" data-vt-transition="pagination" data-vt-pagination-direction="forwards">Older →</a>
  {% endif %}
</nav>
