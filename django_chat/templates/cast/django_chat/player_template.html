<root data-test="player--m" style="max-width:600px;min-width:260px;background:transparent;">
  <style>
    /* Tab panel wrapper — replaces the dark-green chrome with a leaf-tint
       card. Selectors are prefixed with [data-test="player--m"] so rules
       only match inside the player; the player's <root> always carries
       data-test="player--m" (see line 1). */
    [data-test="player--m"] .dc-player-tabs {
      margin: 12px;
      padding: 18px 20px;
      background: #e6f0dc;
      color: #0d0d0d;
      border: 1px solid #cdddc1;
      border-radius: 16px;
      line-height: 1.55;
    }

    [data-test="player--m"] .dc-player-tabs a {
      color: #14513a;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    /* Speaker / timestamp eyebrows render via Podlove's own typography;
       keep them muted instead of inheriting the new dark body colour. */
    [data-test="player--m"] .dc-player-tabs time,
    [data-test="player--m"] .dc-player-tabs .speaker,
    [data-test="player--m"] .dc-player-tabs [class*="timestamp"] {
      color: #5f635d;
    }
  </style>
  <div class="p-4 flex flex-col">
    <div class="flex w-12/12">
      <div class="flex w-8/12 mobile:w-full">
        <div class="flex w-full items-center justify-center">
          <play-button class="block mr-5" variant="simple"></play-button>
          <timer-current class="text-sm mr-5 hidden tablet:block"></timer-current>
          <progress-bar class="mr-5"></progress-bar>
          <timer-duration class="text-sm"></timer-duration>
        </div>
      </div>
      <div class="flex w-4/12 ml-6 mt-4 mobile:hidden">
        <div class="flex w-full justify-start">
          <tab-trigger tab="shownotes" class="mr-4">
            <icon type="info"></icon>
          </tab-trigger>
          <tab-trigger tab="chapters" class="mr-4">
            <icon type="chapter"></icon>
          </tab-trigger>
          <tab-trigger tab="transcripts" class="mr-4">
            <icon type="transcripts"></icon>
          </tab-trigger>
          <tab-trigger tab="files" class="mr-4">
            <icon type="download"></icon>
          </tab-trigger>
          <tab-trigger tab="playlist">
            <icon type="playlist"></icon>
          </tab-trigger>
        </div>
      </div>
    </div>

    <div class="mobile:block tablet:hidden desktop:hidden">
      <divider class="w-full mt-6 mb-3"></divider>
      <div class="flex justify-between">
        <div class="flex w-full justify-between">
          <tab-trigger tab="shownotes">
            <icon type="info"></icon>
          </tab-trigger>
          <tab-trigger tab="chapters">
            <icon type="chapter"></icon>
          </tab-trigger>
          <tab-trigger tab="transcripts">
            <icon type="transcripts"></icon>
          </tab-trigger>
          <tab-trigger tab="files">
            <icon type="download"></icon>
          </tab-trigger>
          <tab-trigger tab="playlist">
            <icon type="playlist"></icon>
          </tab-trigger>
        </div>
      </div>
    </div>
  </div>
  <div class="dc-player-tabs relative overflow-auto" style="max-height:420px;">
    <tab name="shownotes">
      <tab-shownotes></tab-shownotes>
    </tab>
    <tab name="chapters">
      <tab-chapters></tab-chapters>
    </tab>
    <tab name="transcripts">
      <tab-transcripts></tab-transcripts>
    </tab>
    <tab name="files">
      <tab-files></tab-files>
    </tab>
    <tab name="playlist">
      <tab-playlist></tab-playlist>
    </tab>
    <tab-overflow></tab-overflow>
  </div>
  <error></error>
</root>
