---
- name: Deploy Django Chat
  hosts: django_chat
  become: true
  gather_facts: false
  pre_tasks:
    - name: Deploy | Check Django Chat source path on controller
      ansible.builtin.stat:
        path: "{{ django_chat_source_path }}"
      delegate_to: localhost
      become: false
      register: django_chat_source_path_stat

    - name: Deploy | Assert Django Chat source path is usable
      ansible.builtin.assert:
        that:
          - django_chat_source_path | length > 0
          - django_chat_source_path != "/"
          - django_chat_source_path_stat.stat.exists
          - django_chat_source_path_stat.stat.isdir
        fail_msg: "Set DJANGO_CHAT_SOURCE_PATH to the local Django Chat checkout before deploying."

    - name: Deploy | Check encrypted secret file on controller
      ansible.builtin.stat:
        path: "{{ django_chat_secret_file }}"
      delegate_to: localhost
      become: false
      register: django_chat_secret_file_stat

    - name: Deploy | Assert encrypted secret file exists
      ansible.builtin.assert:
        that:
          - django_chat_secret_file_stat.stat.exists
          - django_chat_secret_file_stat.stat.isreg
        fail_msg: "Missing {{ django_chat_secret_file }}. Create it with sops and an age recipient before deploying."

    - name: Deploy | Load SOPS-encrypted service secrets
      ansible.builtin.set_fact:
        service_secrets: "{{ lookup('community.sops.sops', django_chat_secret_file) | from_yaml }}"
      no_log: true

    - name: Deploy | Gather remote facts after local validation
      ansible.builtin.setup:

    - name: Deploy | Run clean-VPS baseline tasks
      ansible.builtin.import_tasks: tasks/bootstrap-host.yml

    # In pre_tasks, so it runs before the roles (uv_install / traefik_deploy /
    # wagtail_deploy) that rsync the source and run migrate — the snapshot is
    # taken before any deploy step can change the database.
    - name: Deploy | Snapshot configured SQLite database(s) before sync and migrate
      ansible.builtin.shell: |
        set -euo pipefail
        db="{{ item }}"
        if [ ! -f "$db" ]; then
          echo "skip: SQLite DB $db not present yet"
          exit 0
        fi
        mkdir -p "{{ django_chat_backup_dir }}"
        safe="$(printf '%s' "${db#/}" | tr '/' '_')"
        dest="{{ django_chat_backup_dir }}/${safe}.$(date +%Y%m%dT%H%M%S).bak"
        "{{ django_chat_site_path }}/.venv/bin/python" -c 'import sqlite3, sys; src = sqlite3.connect(sys.argv[1]); dst = sqlite3.connect(sys.argv[2]); src.backup(dst); dst.close(); src.close()' "$db" "$dest"
        echo "backed up $db -> $dest"
      args:
        executable: /bin/bash
      loop: "{{ django_chat_sqlite_backup_paths }}"
      # Run as the service user (not root) so any WAL/SHM sidecar files the
      # backup touches stay owned by the app user — opening the DB as root can
      # create root-owned sidecars and lock the app out. Only enabled after the
      # first deploy has created the user/DB, so the user exists here.
      become: true
      become_user: "{{ django_chat_service_name }}"
      when: django_chat_sqlite_backup_paths | length > 0
      changed_when: false

  roles:
    - role: local.ops_library.uv_install
    - role: local.ops_library.traefik_deploy
    - role: local.ops_library.wagtail_deploy

  post_tasks:
    - name: Deploy | Ensure Django cache files are owned by the app user
      ansible.builtin.file:
        path: "{{ wagtail_cache_dir }}"
        state: directory
        owner: "{{ wagtail_user }}"
        group: "{{ wagtail_group }}"
        recurse: true

    - name: Deploy | Ensure default Wagtail Site matches deploy hostname
      ansible.builtin.shell: |
        set -a
        . "{{ wagtail_env_path }}"
        set +a
        "{{ wagtail_python }}" "{{ wagtail_manage_py }}" ensure_default_site
      args:
        chdir: "{{ wagtail_site_path }}"
        executable: /bin/bash
      environment:
        DJANGO_SETTINGS_MODULE: "{{ wagtail_django_settings_module }}"
      become: true
      become_user: "{{ wagtail_user }}"
      register: ensure_default_site_result
      changed_when: >-
        'Updated default Site' in ensure_default_site_result.stdout
        or 'Updated TemplateBaseDirectory' in ensure_default_site_result.stdout

    - name: Deploy | Restart Django Chat application service
      ansible.builtin.systemd:
        name: "{{ wagtail_systemd_unit_name }}"
        state: restarted
        daemon_reload: true

    - name: Deploy | Restart Django Chat transcript worker service
      ansible.builtin.systemd:
        name: "{{ wagtail_db_worker_unit_name }}"
        state: restarted
        daemon_reload: true
      when: wagtail_db_worker_enabled | bool
